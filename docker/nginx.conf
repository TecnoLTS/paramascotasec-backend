server {
    listen 80;
    index index.php index.html;
    error_log  /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;
    root /var/www/html/public;
    server_tokens off;
    client_max_body_size 20m;
    autoindex off;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;
    add_header Cross-Origin-Resource-Policy "same-site" always;
    add_header Origin-Agent-Cluster "?1" always;

    location ~ /\.(?!well-known).* {
        deny all;
    }

    location ~* /(composer\.(json|lock)|package(-lock)?\.json|yarn\.lock|pnpm-lock\.yaml|docker-compose\.ya?ml|Dockerfile|phpunit\.xml|readme(?:\.[a-z0-9]+)?|README(?:\.[A-Z0-9]+)?|nginx\.conf|\.env(?:\..*)?)$ {
        return 404;
    }

    location = /debug_uri.php {
        return 404;
    }

    location ^~ /uploads/ {
        autoindex off;
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, no-transform" always;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass paramascotasec-backend-app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param HTTP_HOST $http_host;
        fastcgi_param HTTP_X_FORWARDED_HOST $http_x_forwarded_host;
        fastcgi_param HTTP_X_ORIGINAL_HOST $http_x_original_host;
        fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
        gzip_static on;
    }
}
