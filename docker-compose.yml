services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: paramascotasec-backend-app
    restart: unless-stopped
    working_dir: /var/www/html
    command: >
      sh -c "mkdir -p /var/www/html/public/uploads/products
      && chown -R www-data:www-data /var/www/html/public/uploads
      && chmod -R 775 /var/www/html/public/uploads
      && php-fpm"
    volumes:
      - .:/var/www/html
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: paramascotasec
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
    networks:
      edge:

  web:
    image: nginx:alpine
    container_name: paramascotasec-backend-web
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      edge:

networks:
  edge:
    external: true
    name: edge
