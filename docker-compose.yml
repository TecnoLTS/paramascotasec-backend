services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: paramascotasec-backend-app
    restart: unless-stopped
    working_dir: /var/www/html
    command: >
      sh -c "mkdir -p /var/www/html/public/uploads/products
      && chown -R www-data:www-data /var/www/html/public/uploads
      && chmod -R 775 /var/www/html/public/uploads
      && mkdir -p /var/www/html/storage/sri/xml /var/www/html/storage/sri/signed /var/www/html/storage/sri/authorized /var/www/html/storage/sri/ride /var/www/html/storage/sri/certs /var/www/html/storage/logs/sri
      && chown -R www-data:www-data /var/www/html/storage
      && chmod -R 775 /var/www/html/storage/sri /var/www/html/storage/logs
      && if [ \"${RUN_COMPOSER_INSTALL:-0}\" = \"1\" ] || [ ! -f /var/www/html/vendor/autoload.php ]; then composer install --no-interaction --prefer-dist --optimize-autoloader; fi
      && if [ \"${RUN_DB_BOOTSTRAP:-0}\" = \"1\" ]; then php /var/www/html/scripts/bootstrap_schema.php; fi
      && php-fpm"
    volumes:
      - .:/var/www/html
    environment:
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
      DB_DATABASE: ${DB_DATABASE:-paramascotasec}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-}
      RUN_COMPOSER_INSTALL: ${RUN_COMPOSER_INSTALL:-0}
      RUN_DB_BOOTSTRAP: ${RUN_DB_BOOTSTRAP:-0}
      JWT_SECRET: ${JWT_SECRET}
      APP_ENV: ${APP_ENV:-production}
      APP_URL: ${APP_URL}
      APP_TIMEZONE: ${APP_TIMEZONE:-America/Guayaquil}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_SECURE: ${SMTP_SECURE}
      SRI_ENVIRONMENT: ${SRI_ENVIRONMENT:-test}
      SRI_RUC: ${SRI_RUC}
      SRI_CERT_PATH: ${SRI_CERT_PATH}
      SRI_CERT_PASSWORD: ${SRI_CERT_PASSWORD}
    networks:
      edge:

  web:
    image: nginx:alpine
    container_name: paramascotasec-backend-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      edge:

networks:
  edge:
    external: true
    name: edge
