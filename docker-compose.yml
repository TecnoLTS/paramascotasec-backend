services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: paramascotasec-backend-app
    restart: unless-stopped
    working_dir: /var/www/html
    command: >
      sh -c "mkdir -p /var/www/html/public/uploads/products
      && chown -R www-data:www-data /var/www/html/public/uploads
      && chmod -R 775 /var/www/html/public/uploads
      && if [ \"${RUN_DB_BOOTSTRAP:-1}\" = \"1\" ]; then php /var/www/html/scripts/bootstrap_schema.php; fi
      && php-fpm"
    volumes:
      - .:/var/www/html
    environment:
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
      DB_DATABASE: ${DB_DATABASE:-paramascotasec}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-}
      RUN_DB_BOOTSTRAP: ${RUN_DB_BOOTSTRAP:-1}
    networks:
      edge:

  web:
    image: nginx:alpine
    container_name: paramascotasec-backend-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      edge:

networks:
  edge:
    external: true
    name: edge
