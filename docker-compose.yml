services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: paramascotasec-backend-app
    restart: unless-stopped
    working_dir: /var/www/html
    command: >
      sh -c "mkdir -p /var/www/html/public/uploads/products
      && chown -R www-data:www-data /var/www/html/public/uploads
      && chmod -R 775 /var/www/html/public/uploads
      && chown -R www-data:www-data /var/www/html/storage
      && chmod -R 775 /var/www/html/storage /var/www/html/storage/logs
      && if [ \"${RUN_COMPOSER_INSTALL:-0}\" = \"1\" ] || [ ! -f /var/www/html/vendor/autoload.php ]; then composer install --no-interaction --prefer-dist --optimize-autoloader; fi
      && if [ \"${RUN_DB_BOOTSTRAP:-0}\" = \"1\" ]; then php /var/www/html/scripts/bootstrap_schema.php; fi
      && php-fpm"
    volumes:
      - .:/var/www/html
    environment:
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
      DB_DATABASE: ${DB_DATABASE:-paramascotasec}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-}
      RUN_COMPOSER_INSTALL: ${RUN_COMPOSER_INSTALL:-0}
      RUN_DB_BOOTSTRAP: ${RUN_DB_BOOTSTRAP:-0}
      JWT_SECRET: ${JWT_SECRET}
      AUTH_COOKIE_NAME: ${AUTH_COOKIE_NAME:-pm_auth}
      AUTH_CSRF_COOKIE_NAME: ${AUTH_CSRF_COOKIE_NAME:-pm_csrf}
      AUTH_COOKIE_TTL_SECONDS: ${AUTH_COOKIE_TTL_SECONDS:-10800}
      AUTH_LOGIN_MAX_ATTEMPTS: ${AUTH_LOGIN_MAX_ATTEMPTS:-5}
      AUTH_LOGIN_LOCK_MINUTES: ${AUTH_LOGIN_LOCK_MINUTES:-15}
      ADMIN_IP_MODE: ${ADMIN_IP_MODE:-off}
      ADMIN_IP_ALLOWLIST: ${ADMIN_IP_ALLOWLIST:-}
      TRUST_PROXY_HEADERS: ${TRUST_PROXY_HEADERS:-false}
      APP_ENV: ${APP_ENV:-production}
      APP_URL: ${APP_URL}
      APP_TIMEZONE: ${APP_TIMEZONE:-America/Guayaquil}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_SECURE: ${SMTP_SECURE}
      FACTURADOR_API_URL: ${FACTURADOR_API_URL:-http://facturador}
      FACTURADOR_TIMEOUT: ${FACTURADOR_TIMEOUT:-20}
      FACTURADOR_API_KEY: ${FACTURADOR_API_KEY}
    networks:
      edge:

  web:
    image: nginx:alpine
    container_name: paramascotasec-backend-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      edge:

networks:
  edge:
    external: true
    name: edge
